# ==============================================================================
# Unified Environment for Numerical Weather Prediction (NWP) Models
# ==============================================================================
# This environment is designed to support a wide range of modern NWP models,
# including JAX-based (NeuralGCM, GraphCast), PyTorch-based (Stormer, Aurora,
# AIFS-Anemoi), and ONNX-based (Pangu-Weather) architectures.
#
# Key Design Choices:
# - Python: 3.10
# - Core Frameworks: PyTorch 2.4.0 (CUDA 12.1) & JAX 0.4.30
# - Rationale: These versions are carefully selected for maximum compatibility
# across model ecosystems, especially regarding CUDA/CuDNN dependencies.
#
# Installation Notes:
# - For JAX with CUDA support, the pip install command requires an extra flag:
# pip install -r requirements.txt -f https://storage.googleapis.com/jax-releases/jax_cuda_releases.html
# ==============================================================================

name: nwp_unified
channels:
 - pytorch
 - nvidia
 - conda-forge
 - defaults

dependencies:
 # ------------------------------------------------------------------------------
 # 1. Core Environment & System Libraries
 # ------------------------------------------------------------------------------
 - python=3.10
 - pip
 - git
 - git-lfs
 - libstdcxx-ng # System library often required on modern CUDA platforms (e.g., H100/A100 with CUDA 12).

 # ------------------------------------------------------------------------------
 # 2. Primary Deep Learning Framework (PyTorch)
 # - Version locked to 2.4.0 with CUDA 12.1 for stability and compatibility
 # with specific libraries like xformers and JAX/CuDNN 9.
 # ------------------------------------------------------------------------------
 - pytorch==2.4.0
 - torchvision==0.19.0
 - torchaudio==2.4.0
 - pytorch-cuda=12.1

 # ------------------------------------------------------------------------------
 # 3. Scientific Computing & Data Handling Stack
 # ------------------------------------------------------------------------------
 - numpy==1.26.4 # Pinned to maintain compatibility with older model checkpoints.
 - scipy==1.12.0 # Pinned for stable interaction with Dask and model-specific dependencies.
 - xarray # Core library for labeled multi-dimensional arrays (standard in climate science).
 - dask # For parallel computing and handling large datasets.
 - netcdf4 # For reading and writing NetCDF files.
 - h5netcdf # Alternative NetCDF backend using h5py.
 - h5py
 - pandas
 - zarr # For chunked, compressed, N-dimensional arrays.

 # ------------------------------------------------------------------------------
 # 4. Meteorological Data I/O & Processing
 # ------------------------------------------------------------------------------
 - eccodes # ECMWF library for decoding/encoding GRIB and BUFR formats.
 - cfgrib # Python interface for eccodes, used by xarray.
 - cdsapi # Client for the Copernicus Climate Data Store (CDS) API.

 # ------------------------------------------------------------------------------
 # 5. Pip Dependencies
 # - Installed after conda packages to resolve complex dependencies.
 # ------------------------------------------------------------------------------
 - pip:
 # --- JAX Ecosystem (for NeuralGCM, GraphCast) ---
 # CRITICAL: JAX version is pinned to 0.4.30 to ensure compatibility with
 # PyTorch's CUDA 12.1 and its underlying CuDNN 9 version.
 - jax==0.4.30
 - jaxlib==0.4.30
 # This line specifies the CUDA-enabled build of JAX.
 # NOTE: Requires adding `-f https://storage.googleapis.com/jax-releases/jax_cuda_releases.html`
 # to the pip install command.
 - "jax[cuda12_pip]==0.4.30"

 # Downstream JAX libraries pinned to prevent auto-upgrading JAX.
 - dm-haiku==0.0.12
 - chex==0.1.85
 - flax==0.8.0
 - optax==0.1.9
 - orbax-checkpoint==0.6.4
 - jraph

 # Model-specific JAX libraries
 - neuralgcm==1.2.2
 - dinosaur==1.3.5
 - gcsfs # For accessing Google Cloud Storage.
 # GraphCast is typically installed from source for the latest version.
 - git+https://github.com/google-deepmind/graphcast.git@main

 # --- PyTorch Ecosystem (for Stormer, Aurora, AIFS-Anemoi) ---
 - lightning>=2.0.0 # High-level PyTorch framework.
 - timm # PyTorch Image Models library.
 - einops # Flexible tensor operations.
 - wandb # Experiment tracking.
 - huggingface_hub # For model/dataset sharing.

 # Model-specific PyTorch libraries
 - microsoft-aurora # Microsoft's Aurora model.
 - anemoi-inference[plugin]==0.4.9 # ECMWF AIFS model inference engine.
 - anemoi-models==0.3.1
 - earthkit-regrid # Used for N320 <-> LatLon interpolation
 - earthkit-data
 - torch-geometric # PyG for graph neural networks (version auto-matches PyTorch).

 # Performance optimization for Transformers
 - xformers==0.0.27.post2 # Pinned to a version compatible with PyTorch 2.4.0.

 # --- ONNX Ecosystem (for Pangu-Weather) ---
 - onnx>=1.14.0
 - onnxruntime-gpu # GPU-accelerated ONNX inference runtime.

 # --- Utility and Visualization Libraries ---
 - tqdm # Progress bars.
 - pyyaml # For reading YAML configuration files.
 - matplotlib
 - cartopy # Geospatial data plotting.
 - pydap # For accessing OPeNDAP data sources.

 # h5py
